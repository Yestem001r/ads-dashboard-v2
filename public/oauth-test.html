<!DOCTYPE html>
<html>
<head>
  <title>OAuth Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
    }
    button {
      background: #4285f4;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 4px;
    }
    button:hover {
      background: #357ae8;
    }
    pre {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 4px;
      overflow-x: auto;
    }
    textarea {
      width: 100%;
      font-family: monospace;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h1>🔐 Google Ads OAuth Test</h1>
  
  <button onclick="authorizeGoogle()">Authorize Google Ads</button>
  
  <div id="result"></div>

  <script>
    const CLIENT_ID = '390078100041-ba5lroldabg036i8u28bjmmm4u2f5vgb.apps.googleusercontent.com'
    const REDIRECT_URI = 'http://localhost:3000/oauth/callback'
    const SCOPE = 'https://www.googleapis.com/auth/adwords'

    function authorizeGoogle() {
      const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?` +
        `client_id=${CLIENT_ID}&` +
        `redirect_uri=${encodeURIComponent(REDIRECT_URI)}&` +
        `response_type=code&` +
        `scope=${encodeURIComponent(SCOPE)}&` +
        `access_type=offline&` +
        `prompt=consent`
      
      window.location.href = authUrl
    }
  </script>
</body>
</html>
